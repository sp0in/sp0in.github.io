<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordspoon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo Wordspoon" id="logo-site">
    </header>

    <main>
        <div id="grille">
        </div>

        <div id="clavier" class="transition-fondue">
            <div class="ligne-clavier">
                <button data-key="a">A</button>
                <button data-key="z">Z</button>
                <button data-key="e">E</button>
                <button data-key="r">R</button>
                <button data-key="t">T</button>
                <button data-key="y">Y</button>
                <button data-key="u">U</button>
                <button data-key="i">I</button>
                <button data-key="o">O</button>
                <button data-key="p">P</button>
            </div>
            
            <div class="ligne-clavier">
                <button data-key="q">Q</button>
                <button data-key="s">S</button>
                <button data-key="d">D</button>
                <button data-key="f">F</button>
                <button data-key="g">G</button>
                <button data-key="h">H</button>
                <button data-key="j">J</button>
                <button data-key="k">K</button>
                <button data-key="l">L</button>
                <button data-key="m">M</button>
            </div>
            
            <div class="ligne-clavier">
                <button data-key="Enter" class="touche-large">Entrée</button>
                <button data-key="w">W</button>
                <button data-key="x">X</button>
                <button data-key="c">C</button>
                <button data-key="v">V</button>
                <button data-key="b">B</button>
                <button data-key="n">N</button>
                <button data-key="Backspace" class="touche-large">⌫</button>
            </div>
        </div>

        <div id="ecran-fin" class="transition-fondue cache" style="display: none;">
            <h2 id="fin-titre"></h2>
            <p id="fin-texte"></p>
            
            <div id="fin-mot-secret" class="lettres"></div>
            
            <button id="btn-rejouer" onclick="location.reload()">Rejouer</button>
        </div>
    </main>

    <script src="script.js"></script>

    <div id="notification" class="notification cache"></div>

</body>
</html>
